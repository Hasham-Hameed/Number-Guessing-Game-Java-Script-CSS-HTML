<!DOCTYPE html>
<html lang="en">
<head>
    <title>Guess the Number Game</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input {
            padding: 10px;
            width: 80%;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #00c9a7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00a387;
        }

        .message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 Guess the Number</h2>
    <p>Between 1 and 100</p>

    <input type="number" id="guessInput" placeholder="Enter your guess">
    <br>
    <button onclick="checkGuess()">Submit</button>

    <p class="message" id="message"></p>
</div>

<script>
let randomNumber = Math.floor(Math.random() * 100) + 1;
let attempts = 0;

function checkGuess() {
    let input = document.getElementById("guessInput");
    let message = document.getElementById("message");

    let guess = Number.parseInt(input.value);
    attempts++;

    if (isNaN(guess)) {
        message.textContent = "❌ Enter a valid number!";
        return;
    }

    if (guess > randomNumber) {
        message.textContent = "📉 Too high!";
    } 
    else if (guess < randomNumber) {
        message.textContent = "📈 Too low!";
    } 
    else {
        message.textContent = "🎉 Correct! Attempts: " + attempts;
    }

    input.value = "";
}
</script>

</body>
</html>
